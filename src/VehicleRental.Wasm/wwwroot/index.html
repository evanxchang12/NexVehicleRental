<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexVehicleRental — 電競租車</title>
    <base href="/NexVehicleRental/" />
    <!-- SPA routing restore script (GitHub Pages workaround) -->
    <script>
        (function(l) {
            if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function(s) {
                    return s.replace(/~and~/g, '&')
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash
                );
            }
        }(window.location))
    </script>
    <link rel="preload" id="webassembly" />
    <!-- Bootstrap 5.3 CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous" />
    <!-- Google Font: Rajdhani -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Esports theme -->
    <link rel="stylesheet" href="css/esports.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="VehicleRental.Wasm.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="esports-loading d-flex justify-content-center align-items-center" style="height:100vh;">
            <div class="text-center">
                <div class="spinner-border esports-spinner mb-3" role="status"></div>
                <p class="esports-loading-text">載入中...</p>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" class="alert alert-danger m-3 d-none">
        發生未處理的錯誤。
        <a href="." class="alert-link">重新載入</a>
        <button type="button" class="btn-close float-end" onclick="document.getElementById('blazor-error-ui').classList.add('d-none')"></button>
    </div>

    <!-- Bootstrap 5.3 JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmCEjP0WZIrqBFcXH2OeHNOYEKc"
            crossorigin="anonymous"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
